<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1890ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="血压记录" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="面向老年人的血压记录应用程序，支持每日记录多个血压测量值以及用药情况。界面简洁易用，专为老年用户设计。"
    />
    <meta name="keywords" content="血压记录,老年人,健康管理,用药管理,血压监测" />

    <!-- iOS PWA Support -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />

    <!-- Android PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-title" content="血压记录" />

    <!-- Windows PWA Support -->
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/logo192.png" />
    <meta name="msapplication-TileColor" content="#1890ff" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preload critical resources -->
    <link rel="preconnect" href="http://localhost:3001" />

    <title>血压记录APP - 老年人健康管理助手</title>

    <!-- Critical CSS for elderly users -->
    <style>
      * {
        font-size: inherit;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                     'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        touch-action: manipulation;
      }

      /* Loading screen for elderly users */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: #f0f2f5;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .loading-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 20px;
        border: 4px solid #e1e5e9;
        border-top: 4px solid #1890ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        font-size: 18px;
        color: #666;
        text-align: center;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Hide loading once React loads */
      .app-loaded .app-loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-size: 18px;">
        <h2>需要启用JavaScript</h2>
        <p>此应用需要JavaScript才能正常运行，请在浏览器设置中启用JavaScript后重新加载页面。</p>
      </div>
    </noscript>

    <!-- Loading screen -->
    <div class="app-loading">
      <div class="loading-icon"></div>
      <div class="loading-text">血压记录APP正在加载...</div>
    </div>

    <div id="root"></div>
  </body>
</html>
